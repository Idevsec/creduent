name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  validate:
    name: Validate Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Validate Schema Files
        run: |
          python -c "import json, pathlib; [json.loads(f.read_text()) for f in pathlib.Path('schemas').glob('*.json')] if pathlib.Path('schemas').exists() else print('No schemas dir'); print('Schema validation passed')"

      - name: Run Tests (if any)
        run: python -m pytest --tb=short --ignore=.vercel -q || echo "No tests found, skipping"
